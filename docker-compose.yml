# =============================================================
# Docker Compose - Red Social
# Levanta dos servicios:
#   - app  : servidor Go (construido desde el Dockerfile)
#   - db   : PostgreSQL (última versión estable)
# =============================================================

services:

  # -----------------------------------------------------------
  # Servicio: base de datos PostgreSQL
  # -----------------------------------------------------------
  db:
    image: postgres:16
    container_name: red_social_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-usuario}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB:       ${POSTGRES_DB:-red_social}
    volumes:
      # Persistencia de datos entre reinicios
      - postgres_data:/var/lib/postgresql/data
      # Ejecutar migraciones automáticamente al arrancar por primera vez
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      # Expuesto en el host para acceder con herramientas externas (psql, DBeaver…)
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-usuario} -d ${POSTGRES_DB:-red_social}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -----------------------------------------------------------
  # Servicio: aplicación Go
  # -----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: red_social_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy   # espera a que Postgres esté listo
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-usuario}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-red_social}?sslmode=disable
      PORT:         ${PORT:-8080}
      APP_ENV:      ${APP_ENV:-development}
      JWT_SECRET:   ${JWT_SECRET:-cambiar_esto_por_un_secreto_seguro}
    ports:
      - "${PORT:-8080}:8080"
    # Montar TODO el código fuente para que air detecte cambios
    # y los uploaded files persistan en el host
    volumes:
      - .:/app

# =============================================================
# Volúmenes nombrados
# =============================================================
volumes:
  postgres_data:
